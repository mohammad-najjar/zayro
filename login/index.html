<!DOCTYPE html>
<html lang="eng">
    <head>
        <title>Zayro</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="/login/zayro.png">
        <link rel="stylesheet" href="/login/style.css">
        <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    </head>
    <body>
        <div class="img">              
            <img src="zayro-removebg-preview.png" style="width: 300px; height: 180px">
        </div>
        
        <div class="page-login">
            <form action="">
                <h1>Login</h1>
                <div class="input-login">
                    <input type="text" placeholder="Email" required>
                    <i class="bxrf bx-user"></i>
                </div>
                <div class="input-login">
                    <input type="password" placeholder="Password" required>
                    <i class="bxrf bx-lock"></i>
                </div>
                <div class="remember-login">
                    <a href="#">forget password?</a>
                </div>
                <button type="submit" class="btn">Login</button>
                <div class="register">
                    <p>Don't have an account? <a href="/signup">Register</a></p>
                </div>
            </form>
        </div>
    </body>
</html>

<script>
document.addEventListener("DOMContentLoaded", () => {

  // إذا في توكن → يدخل ع الموقع
  const token = localStorage.getItem("token");
  if (token) {
    window.location.href = "/";
  }

  const form = document.querySelector("form");

  form.addEventListener("submit", async function(event) {
    event.preventDefault();

    const inputs = document.querySelectorAll(".input-login input");
    const input = inputs[0].value;
    const password = inputs[1].value;

    const res = await fetch("http://localhost:3000/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ input, password })
    });

    const data = await res.json();

    if (data.token) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("username", data.username); // ← هون الصح
      window.location.href = "/";
    } 
    else if (data.message.includes("User not found")) {
      alert("المستخدم غير موجود");
      window.location.href = "/signup";
    } 
    else {
      alert("كلمة المرور غلط ");
    }
  });

});
</script>
