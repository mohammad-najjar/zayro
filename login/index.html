<script>
const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "login.html";
}
</script>

<!DOCTYPE html>
<html lang="eng">
    <head>
        <title>Zayro</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, inatial-scale=1.0">
        <link rel="icon" type="image/png" href="zayro.png">
        <link rel="stylesheet" href="style.css">
        <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">


    </head>

    <body>
        
        <div class="img">              
            <img src="zayro-removebg-preview.png"  style="width: 300px ; height: 180px">
        </div>
        
        <div class="page-login">
            <form action="">
                <h1>Login</h1>
                
               
                
                <div class="input-login">
                    <input type="text" placeholder="User-Name" required>
                    <i class="bxrf bx-user"></i>
                </div>
                
                <div class="input-login">
                    <input type="password" placeholder="Password " required>
                    <i class="bxrf bx-lock"></i>
                </div>

                
                
                <div class="remember-login">
                    <label><input type="checkbox">Remember Me</label>
                    <a href="#">forget password?</a>
                </div>
            
                <button type="submit" class="btn">Login</button>
                
                
                <div class="register">
                    <p>Don't have an account? <a href="https://zayroshoop.store/signup">Register</a> </p>
                    

            </form>



        </div>




    </body>


</html>


<script>
document.addEventListener("DOMContentLoaded", () => {

  // إذا في توكن → يدخل ع الموقع
  const token = localStorage.getItem("token");
  if (token) {
    window.location.href = "https://zayroshoop.store/";
  }

  const form = document.querySelector("form");

  form.addEventListener("submit", async function(event) {
    event.preventDefault();

    // نجيب القيم بدون IDs
    const inputs = document.querySelectorAll(".input-login input");

    const input = inputs[0].value;
    const password = inputs[1].value;

    const res = await fetch("http://localhost:3000/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ input, password })
    });

    const data = await res.json();

    if (data.token) {
      localStorage.setItem("token", data.token);

      // 🔥 دخول ع الموقع مباشرة
      window.location.href = "https://zayroshoop.store/";
    } 
    else if (data.message.includes("User not found")) {
      alert("ما عندك حساب، اعمل حساب أول!");
      window.location.href = "signup.html";
    } 
    else {
      alert("كلمة المرور غلط ❌");
    }

  });

});
</script>
