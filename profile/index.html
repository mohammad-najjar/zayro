<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zayro - My Profile</title>
    <link rel="icon" href="/shoop/zayro.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Inter", sans-serif; }
        body { background: #f3f3f3; min-height: 100vh; }
        .top_bar { background: #000; padding: 15px 40px; display: flex; align-items: center; justify-content: space-between; }
        .top_bar a { color: #fff; text-decoration: none; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .top_bar img { height: 40px; }
        .profile_container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .profile_card { background: #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 2px 20px rgba(0,0,0,0.08); margin-bottom: 25px; }
        .profile_header {
            background: linear-gradient(135deg, #000 0%, #333 100%);
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 12px;
        }
        .avatar_wrapper { position: relative; width: 120px; height: 120px; }
        .avatar_wrapper img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #ff9900; }
        .avatar_wrapper .default_avatar { width: 120px; height: 120px; border-radius: 50%; background: #f3f3f3; display: flex; align-items: center; justify-content: center; border: 4px solid #ff9900; }
        .avatar_wrapper .default_avatar i { font-size: 60px; color: #aaa; }
        .avatar_edit_btn { position: absolute; bottom: 4px; right: 4px; width: 34px; height: 34px; background: #ff9900; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #fff; }
        .avatar_edit_btn i { font-size: 13px; color: #fff; }
        #avatar_input { display: none; }
        .profile_header_info h2 { color: #fff; font-size: 24px; }
        .profile_header_info .member_since { color: #ff9900; font-size: 13px; margin-top: 4px; }
        .profile_body { padding: 30px; }
        .profile_body h3 { font-size: 16px; margin-bottom: 20px; color: #333; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        .form_grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form_group { display: flex; flex-direction: column; gap: 6px; }
        .form_group.full { grid-column: 1 / -1; }
        .form_group label { font-size: 13px; color: #666; font-weight: 600; }
        .form_group input { padding: 10px 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; transition: 0.2s; }
        .form_group input:focus { border-color: #000; }
        .form_group input:disabled { background: #f8f8f8; color: #999; }
        .save_btn { margin-top: 20px; background: #000; color: #fff; padding: 12px 30px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .save_btn:hover { background: #333; }
        .success_msg { display: none; color: green; font-size: 14px; margin-top: 10px; font-weight: bold; }
        .logout_card { background: #fff; border-radius: 15px; padding: 20px 30px; box-shadow: 0 2px 20px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; }
        .logout_card p { color: #666; font-size: 14px; }
        .logout_btn { background: #e51a1a; color: #fff; padding: 10px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .logout_btn:hover { background: #c41515; }
        @media (max-width: 600px) { .form_grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="top_bar">
    <a href="/"><i class="fa-solid fa-arrow-left"></i> Back to Store</a>
    <img src="/shoop/zayrowhite.png" alt="Zayro">
</div>

<div class="profile_container">
    <div class="profile_card">
        <div class="profile_header">
            <div class="avatar_wrapper">
                <div id="avatar_display"></div>
                <label for="avatar_input" class="avatar_edit_btn">
                    <i class="fa-solid fa-camera"></i>
                </label>
                <input type="file" id="avatar_input" accept="image/*" onchange="uploadAvatar(this)">
            </div>
            <div class="profile_header_info">
                <h2 id="header_username"></h2>
                <p class="member_since" id="member_since"></p>
            </div>
        </div>

        <div class="profile_body">
            <h3><i class="fa-solid fa-user"></i> Personal Information</h3>
            <div class="form_grid">
                <div class="form_group">
                    <label>Username</label>
                    <input type="text" id="input_username">
                </div>
                <div class="form_group">
                    <label>Email</label>
                    <input type="email" id="input_email" disabled>
                </div>
                <div class="form_group">
                    <label>Phone</label>
                    <input type="text" id="input_phone" placeholder="Your phone number">
                </div>
                <div class="form_group full">
                    <label>Address</label>
                    <input type="text" id="input_address" placeholder="Your address">
                </div>
            </div>
            <button class="save_btn" onclick="saveProfile()">
                <i class="fa-solid fa-floppy-disk"></i> Save Changes
            </button>
            <p class="success_msg" id="success_msg">✅ Profile updated successfully!</p>
        </div>
    </div>

    <div class="logout_card">
        <p>Want to sign out from your account?</p>
        <button class="logout_btn" onclick="logout()">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
    </div>
</div>

<script>
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "/login";

    async function loadProfile() {
        const res = await fetch("http://localhost:3000/api/profile", {
            headers: { "Authorization": "Bearer " + token }
        });
        const user = await res.json();

        document.getElementById("header_username").innerText = user.username || "";
        document.getElementById("input_username").value = user.username || "";
        document.getElementById("input_email").value = user.email || "";
        document.getElementById("input_phone").value = user.phone || "";
        document.getElementById("input_address").value = user.address || "";

        if (user.createdAt) {
            const date = new Date(user.createdAt);
            document.getElementById("member_since").innerText = "Member since " + date.toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
        }

        const avatarDisplay = document.getElementById("avatar_display");
        if (user.avatar) {
            avatarDisplay.innerHTML = `<img src="http://localhost:3000${user.avatar}" alt="avatar">`;
            localStorage.setItem("avatar", user.avatar);
        } else {
            avatarDisplay.innerHTML = `<div class="default_avatar"><i class="fa-solid fa-circle-user"></i></div>`;
        }
    }

    async function saveProfile() {
        const username = document.getElementById("input_username").value;
        const phone = document.getElementById("input_phone").value;
        const address = document.getElementById("input_address").value;

        const res = await fetch("http://localhost:3000/api/profile", {
            method: "PUT",
            headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
            body: JSON.stringify({ username, phone, address })
        });
        const data = await res.json();

        if (data.user) {
            localStorage.setItem("username", data.user.username);
            document.getElementById("header_username").innerText = data.user.username;
            const msg = document.getElementById("success_msg");
            msg.style.display = "block";
            setTimeout(() => msg.style.display = "none", 3000);
        }
    }

    async function uploadAvatar(input) {
        const file = input.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append("avatar", file);
        const res = await fetch("http://localhost:3000/api/upload-avatar", {
            method: "POST",
            headers: { "Authorization": "Bearer " + token },
            body: formData
        });
        const data = await res.json();
        if (data.avatar) {
            localStorage.setItem("avatar", data.avatar);
            document.getElementById("avatar_display").innerHTML = `<img src="http://localhost:3000${data.avatar}" alt="avatar">`;
        }
    }

    function logout() {
        localStorage.removeItem("token");
        localStorage.removeItem("username");
        localStorage.removeItem("avatar");
        window.location.href = "/";
    }

    loadProfile();
</script>
</body>
</html>
