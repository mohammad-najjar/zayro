<!DOCTYPE html>
<html lang="eng,ar">
    <head>
        <title>Zayro Store</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/png" href="/signup/zayro.png">
        <link rel="stylesheet" href="/signup/style.css">
        <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    </head>
    <body>
        <div class="img">              
            <img src="/signup/zayro-removebg-preview.png" style="width: 300px; height: 180px">
        </div>
        <div class="page-signup">
            <form action="">
                <h1>sign up</h1>
                <div class="input-signup">
                    <input type="text" placeholder="User-Name" required>
                    <i class="bxrf bx-user"></i>
                </div>
                <div class="input-signup">
                    <input type="email" placeholder="email" required>
                    <i class="bxrf bx-user"></i>
                </div>
                <div class="input-signup">
                    <input type="password" placeholder="Password" required>
                    <i class="bxrf bx-lock"></i>
                </div>
                <div class="remember-signup">
                    <a href="#">forget password?</a>
                </div>
                <button type="submit" class="btn">Signup</button>
                <div class="Login">
                    <p>Do you have an account? <a href="/login">login</a></p>
                </div>
            </form>
        </div>
    </body>
</html>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const token = localStorage.getItem("token");
    if (token) window.location.href = "/";

    const form = document.querySelector("form");

    form.addEventListener("submit", async function(event) {
        event.preventDefault();

        const inputs = document.querySelectorAll(".input-signup input");
        const username = inputs[0].value;
        const email = inputs[1].value;
        const password = inputs[2].value;

        const res = await fetch("http://localhost:3000/signup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, email, password })
        });

        const data = await res.json();

        if (data.message.includes("User created")) {
            // بعد الساين اب يعمل لوجين تلقائي ويحفظ البيانات
            const loginRes = await fetch("http://localhost:3000/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ input: email, password })
            });
            const loginData = await loginRes.json();

            if (loginData.token) {
                localStorage.setItem("token", loginData.token);
                localStorage.setItem("username", loginData.username);
                if (loginData.avatar) localStorage.setItem("avatar", loginData.avatar);
                window.location.href = "/";
            } else {
                window.location.href = "/login";
            }
        } else {
            alert(data.message);
        }
    });
});
</script>
