

<!DOCTYPE html>
<html lang="eng,ar">
    <head>
        <title>Zayro Store</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, inatial-scale=1.0">
        <link rel="icon" type="image/png" href="zayro.png">
        <link rel="stylesheet" href="/signup/style.css">
        <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">


    </head>

    <body>
        
        <div class="img">              
            <img src="zayro-removebg-preview.png"  style="width: 300px ; height: 180px">
        </div>
        
        <div class="page-signup">
            <form action="">
                <h1>sign up</h1>
                
               
                
                <div class="input-signup">
                    <input type="text" placeholder="User-Name" required>
                    <i class="bxrf bx-user"></i>
                </div>
                
                <div class="input-signup">
                    <input type="email" placeholder="email" required>
                    <i class="bxrf bx-user"></i>
                </div>
                
                <div class="input-signup">
                    <input type="password" placeholder="Password " required>
                    <i class="bxrf bx-lock"></i>
                </div>

                
                
                <div class="remember-signup">
                    <label><input type="checkbox">Remember Me</label>
                    <a href="#">forget password?</a>
                </div>
            
                <button type="submit" class="btn">Signup</button>
                
                
                <div class="Login">
                    <p>Do you have an account? <a href="https://zayroshoop.store/login">login</a> </p>
                    

            </form>



        </div>




    </body>


</html>
<script>
async function signup() {

  const username = document.getElementById("username").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("http://localhost:3000/signup", {

    method: "POST",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify({
      username,
      email,
      password
    })

  });

  const data = await res.json();

  alert(data.message);

}
</script>


<script>
document.addEventListener("DOMContentLoaded", () => {

  const token = localStorage.getItem("token");

  // إذا مسجل → يروح ع الموقع
  if (token) {
    window.location.href = "https://zayroshoop.store/";
  }

  // نمسك الفورم
  const form = document.querySelector("form");

  form.addEventListener("submit", async function(event) {
    event.preventDefault();

    const inputs = document.querySelectorAll(".input-signup input");

    const username = inputs[0].value;
    const email = inputs[1].value;
    const password = inputs[2].value;

    const res = await fetch("http://localhost:3000/signup", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username, email, password })
    });

    const data = await res.json();

    alert(data.message);

    if (data.message.includes("User created")) {
        window.location.href = "/login";
    }
  });

});
</script>
