<div class="container product_details">
    <div class="image_item">
        <img id="main_img" src="" alt="">
    </div>
    <div class="details_text">
        <h1 id="product_name"></h1>
        <p class="price" id="product_price"></p>
        <p class="description" id="product_desc"></p>
        
        <div class="options">
            <p>Color: <span>Black</span></p>
            <p>Storage: <span>128GB</span></p>
        </div>
        
        <div class="buttons">
            <button class="btn_add_cart">Add To Cart</button>
            <button class="btn_buy_now">Buy It Now</button>
        </div>
    </div>
</div>
